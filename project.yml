name: CommandCenter
options:
  bundleIdPrefix: com.bobkitchen
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: true
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    INFOPLIST_FILE: CommandCenter/Info.plist

targets:
  CommandCenter:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: CommandCenter
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: CommandCenter/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bobkitchen.commandcenter
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
