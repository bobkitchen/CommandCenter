name: CommandCenter
options:
  bundleIdPrefix: com.bobkitchen
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: true
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    INFOPLIST_FILE: CommandCenter/Info.plist

targets:
  CommandCenter:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: CommandCenter
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: CommandCenter/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bobkitchen.commandcenter
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: CommandCenter/CommandCenter.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bobkitchen.commandcenter
    dependencies:
      - target: CommandCenterWidgetExtension

  CommandCenterMac:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: CommandCenter
        excludes:
          - Info.plist
          - CommandCenterApp.swift
      - path: CommandCenterMac
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: CommandCenterMac/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bobkitchen.commandcenter.mac
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        MACOSX_DEPLOYMENT_TARGET: "15.0"
    entitlements:
      path: CommandCenterMac/CommandCenterMac.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bobkitchen.commandcenter
        com.apple.security.network.client: true

  CommandCenterWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: CommandCenterWidget
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bobkitchen.commandcenter.widget
        INFOPLIST_FILE: CommandCenterWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Command Center Widget"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
    entitlements:
      path: CommandCenterWidget/CommandCenterWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bobkitchen.commandcenter
